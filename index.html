<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Haruki Labs</title>
    <meta name="description" content="Haruki Labs — an independent software studio." />
    <link rel="icon" type="image/svg+xml" href="assets/haruki_mark.svg" />

    <meta property="og:title" content="Haruki Labs" />
    <meta property="og:description" content="An independent software studio." />
    <meta property="og:image" content="https://www.harukilabs.com/assets/haruki_mark.svg" />
    <meta property="og:url" content="https://www.harukilabs.com" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --near-black: #1c1c1e;
        --paper: #f7f4ee;
        --gold: #c9922a;
        --muted: #6b6862;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--paper);
        color: var(--near-black);
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Helvetica, Arial, sans-serif;
        font-weight: 400;
        line-height: 1.5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        text-align: center;
      }

      .logo {
        width: 140px;
        height: auto;
        display: block;
        margin-bottom: 12px;
      }

      .wordmark {
        font-weight: 600;
        font-size: 28px;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin: 0 0 16px;
      }

      .tagline {
        font-weight: 400;
        font-size: 17px;
        color: var(--muted);
        margin: 0 0 40px;
        max-width: 32ch;
      }

      .contact {
        font-weight: 500;
        font-size: 15px;
        color: var(--near-black);
        text-decoration: none;
        border-bottom: 1px solid var(--gold);
        padding-bottom: 2px;
        transition: color 0.15s ease;
      }

      .contact:hover {
        color: var(--gold);
      }

      footer {
        padding: 24px;
        text-align: center;
        font-size: 13px;
        color: var(--muted);
      }

      @media (min-width: 640px) {
        .logo {
          width: 168px;
          margin-bottom: 16px;
        }

        .wordmark {
          font-size: 32px;
        }

        .tagline {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <img src="assets/haruki_mark.svg" alt="Haruki Labs mark" class="logo" />
      <h1 class="wordmark">Haruki Labs</h1>
      <p class="tagline">An independent software studio.</p>
      <a class="contact" href="mailto:hello@harukilabs.com">hello@harukilabs.com</a>
    </main>

    <footer>&copy; 2026 Haruki Labs LLC</footer>
  </body>
</html>
